<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary SEO -->
    <title>McSpencer Enterprise | South Africa's Multi-Category Marketplace</title>
    <meta name="description" content="McSpencer Enterprise — South Africa's trusted online marketplace. Shop Electronics, Renewable Energy (solar inverters & batteries), Car Spares, Fashion, Stationery & AgroMarket. Load-shedding ready." />
    <meta name="keywords" content="McSpencer, South Africa online shop, solar inverter, hybrid inverter, Sunsynk, Pylontech battery, electronics SA, car spares South Africa, fashion SA, renewable energy, load shedding solutions" />
    <meta name="author" content="McSpencer Enterprise" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://mcspencerenterprise.co.za/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mcspencerenterprise.co.za/" />
    <meta property="og:site_name" content="McSpencer Enterprise" />
    <meta property="og:title" content="McSpencer Enterprise | South Africa's Multi-Category Marketplace" />
    <meta property="og:description" content="Shop Electronics, Renewable Energy, Car Spares, Fashion, Stationery & AgroMarket. SA's trusted marketplace — load-shedding ready solutions." />
    <meta property="og:image" content="https://mcspencerenterprise.co.za/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="McSpencer Enterprise — South Africa's Multi-Category Marketplace" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@McSpencerSA" />
    <meta name="twitter:title" content="McSpencer Enterprise | SA's Multi-Category Marketplace" />
    <meta name="twitter:description" content="Shop Electronics, Solar Energy, Car Spares, Fashion & more. Load-shedding ready. Delivered across South Africa." />
    <meta name="twitter:image" content="https://mcspencerenterprise.co.za/opengraph.jpg" />

    <!-- Geo & Regional -->
    <meta name="geo.region" content="ZA" />
    <meta name="geo.placename" content="South Africa" />
    <meta name="language" content="English" />
    <meta name="coverage" content="ZA" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />
    <meta name="revisit-after" content="3 days" />

    <!-- Favicon & Theme -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <meta name="theme-color" content="#1a3a6b" />
    <meta name="msapplication-TileColor" content="#1a3a6b" />

    <!-- Structured Data — Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "McSpencer Enterprise",
      "url": "https://mcspencerenterprise.co.za",
      "logo": "https://mcspencerenterprise.co.za/logo.jpg",
      "description": "South Africa's trusted multi-category online marketplace — Electronics, Renewable Energy, Car Spares, Fashion, Stationery and AgroMarket.",
      "address": { "@type": "PostalAddress", "addressCountry": "ZA" },
      "sameAs": []
    }
    </script>

    <!-- Structured Data — WebSite with Sitelinks Searchbox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "McSpencer Enterprise",
      "url": "https://mcspencerenterprise.co.za",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://mcspencerenterprise.co.za/shop?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data — Store -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "McSpencer Enterprise",
      "url": "https://mcspencerenterprise.co.za",
      "image": "https://mcspencerenterprise.co.za/opengraph.jpg",
      "description": "Multi-category South African marketplace. Load-shedding ready renewable energy, electronics, car spares, fashion and more.",
      "priceRange": "R179 – R39999",
      "currenciesAccepted": "ZAR",
      "paymentAccepted": "Cash, EFT, Credit Card",
      "areaServed": { "@type": "Country", "name": "South Africa" }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-8185729929783991" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8185729929783991" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
